<div class="product-preview content" [ngClass]="'status-' + product.status">
  <ng-content select="[deleteFavoriteAction]"></ng-content>
  <a
    class="product-image"
    [routerLink]="['/product', product.id]"
    routerLinkActive="router-link-active"
  >
    <img class="product-preview__image" [src]="product?.image" [alt]="product?.title" />
  </a>
  <a
    [routerLink]="['/product', product.id]"
    [title]="product?.title"
    routerLinkActive="router-link-active"
    class="product-title"
    >Ноутбук ASUS TUF Gaming F15 FX506LH-HN153 (90NR03U1-M08940) Fortress Gray + мышь Asus TUF M5</a
  >
  <div class="product-main">
    <div class="product__price-wrap">
      <app-product-price [price]="product?.price"></app-product-price>
      <ng-content select="[favoritesAction]"></ng-content>
      <ng-content select="[cardAction]"></ng-content>   
    </div>
  </div>
</div>
